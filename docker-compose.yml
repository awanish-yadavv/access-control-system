services:

  # ── Valkey (Redis-compatible) — BullMQ job queue ────────────────────────────
  # Uses the official valkey image directly — pull once: docker pull valkey/valkey:latest
  valkey:
    image: valkey/valkey:latest
    container_name: acs-valkey
    restart: unless-stopped
    networks:
      - acs-net

  # ── Mosquitto MQTT Broker ───────────────────────────────────────────────────
  # Port 8883 (TLS) is public — ESP32 devices connect here from the internet.
  # Port 1883 is internal only — backend reaches it via Docker network (no TLS).
  # Credentials and ACL are generated at startup from mosquitto/.env (never in files).
  # TLS cert path: /etc/letsencrypt/live/${MQTT_DOMAIN}  (set MQTT_DOMAIN in root .env)
  # Custom build needed — entrypoint.sh generates passwords/ACL from env vars at startup.
  mosquitto:
    build: ./mosquitto
    image: acs-mqtt:latest
    container_name: acs-mqtt
    restart: unless-stopped
    env_file: ./mosquitto/.env
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/acl.conf.template:/mosquitto/config/acl.conf.template:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      # Mount the whole letsencrypt tree so the live/* symlinks (which point
      # into ../../archive) resolve correctly inside the container.
      # The entrypoint copies the resolved certs into /mosquitto/certs/.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - acs-net

  # ── Backend (Node.js + Express + TypeORM) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: acs-backend:latest
    container_name: acs-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Override localhost values from .env with Docker container hostnames
      MQTT_BROKER_URL: mqtt://acs-mqtt:1883
      REDIS_HOST: acs-valkey
      REDIS_PORT: "6379"
      # If PostgreSQL runs on the host machine (not in Docker):
      # DATABASE_URL: postgresql://<user>:<pass>@host.docker.internal:5432/access_control
    depends_on:
      - valkey
      - mosquitto
    networks:
      - acs-net
    # Lets the backend reach PostgreSQL running on the Docker host (Linux needs this).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: acs-frontend:latest
    container_name: acs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - acs-net

networks:
  acs-net:
    external: true
    name: acs-net