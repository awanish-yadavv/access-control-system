# ══════════════════════════════════════════════════════════════
# NeyoFit MQTT Broker — Mosquitto Configuration
# No secrets in this file. Passwords are injected via entrypoint.
# ══════════════════════════════════════════════════════════════

# ── Process user ───────────────────────────────────────────────
# Stay as root inside the container so we can read passwd (created by
# entrypoint as root) and write to bind-mounted /log and /data. Single-
# process container — there is no privilege boundary to defend.
user root

# ── Persistence ────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Auth (passwd + acl are written by entrypoint.sh) ──────────
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

# ── Listener 1: Plain — internal Docker network ONLY ──────────
# Backend connects here. Port NOT exposed to host in compose.
listener 1883

# ── Listener 2: TLS — public internet for ESP32 devices ───────
listener 8883
certfile /mosquitto/certs/fullchain.pem
keyfile  /mosquitto/certs/privkey.pem
tls_version tlsv1.2
